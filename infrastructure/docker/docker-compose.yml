version: "3.9"

# TissaTech AI Agent — Full Stack Docker Compose
# Works on any machine with Docker installed — cloud, on-prem, or local.
# No Kubernetes dependency.

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tissatech_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tissatech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-tissatech}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"   # bind to localhost only — never expose to internet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tissatech}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - external

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tissatech_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - external

  # ── Backend API ───────────────────────────────────────────────────────────
  migrate:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    container_name: tissatech_migrate
    restart: "no"
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tissatech}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tissatech}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    container_name: tissatech_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tissatech}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tissatech}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      USE_CELERY_IN_DEV: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"  
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - internal
      - external
    # volumes:
    #   - ./backend:/app:ro   # read-only mount in prod

  # ── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    container_name: tissatech_worker
    restart: unless-stopped
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tissatech}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tissatech}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - external

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────
  beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    container_name: tissatech_beat
    restart: unless-stopped
    # command: celery -A app.workers.tasks beat --loglevel=info
    command: celery -A app.workers.tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tissatech}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tissatech}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── FastMCP Server ────────────────────────────────────────────────────────
  mcp:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    container_name: tissatech_mcp
    restart: unless-stopped
    command: python -m app.agents.mcp_server
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tissatech}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tissatech}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    expose:
      - "8001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: tissatech_frontend
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    ports:
      - "3000:3000"
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - internal
      - external

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tissatech_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - external
      - internal

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: tissatech_prometheus
    restart: unless-stopped
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - internal
      - external
    depends_on:
      - backend
      - postgres-exporter
      - redis-exporter
      - celery-exporter
      - alertmanager
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: tissatech_alertmanager
    restart: unless-stopped
    volumes:
      - ../prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - internal
      - external

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: tissatech_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      - internal
      - external
    depends_on:
      - prometheus

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: tissatech_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-tissatech}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tissatech}?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: tissatech_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: tissatech_celery_exporter
    restart: unless-stopped
    command:
      - "--broker-url=redis://:${REDIS_PASSWORD}@redis:6379/1"
    expose:
      - "9540"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal


volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  nginx_certs:
  nginx_logs:

networks:
  internal:
    driver: bridge
    internal: true          # no direct internet access from internal services
  external:
    driver: bridge
